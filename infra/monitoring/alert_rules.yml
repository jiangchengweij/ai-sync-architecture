groups:
  - name: sync_alerts
    rules:
      - alert: SyncSuccessRateLow
        expr: sync_success_rate < 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Sync success rate below 90%"
          description: "Current success rate: {{ $value | humanizePercentage }}"

      - alert: SyncSuccessRateCritical
        expr: sync_success_rate < 0.7
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Sync success rate critically low"
          description: "Current success rate: {{ $value | humanizePercentage }}"

      - alert: SyncLatencyHigh
        expr: histogram_quantile(0.99, rate(sync_duration_seconds_bucket[5m])) > 60
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Sync P99 latency exceeds 60s"
          description: "P99 latency: {{ $value }}s"

      - alert: AIApiErrorRateHigh
        expr: rate(ai_api_errors_total[5m]) > 0.1
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "AI API error rate elevated"
          description: "Error rate: {{ $value }}/s"

      - alert: QueueDepthHigh
        expr: queue_depth > 500
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Queue depth exceeds 500"
          description: "Queue {{ $labels.queue_name }}: {{ $value }} jobs"

      - alert: QueueDepthCritical
        expr: queue_depth > 1000
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Queue depth critically high"
          description: "Queue {{ $labels.queue_name }}: {{ $value }} jobs"

      - alert: PendingReviewsHigh
        expr: review_pending_count > 50
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Too many pending reviews"
          description: "{{ $value }} reviews awaiting action"
