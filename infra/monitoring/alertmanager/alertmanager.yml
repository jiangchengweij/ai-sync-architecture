global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: "default"
  routes:
    - match:
        severity: critical
      receiver: "critical"
      repeat_interval: 5m
    - match:
        severity: warning
      receiver: "default"

receivers:
  - name: "default"
    webhook_configs:
      - url: "http://api:3000/api/v1/webhooks/alerts"
        send_resolved: true

  - name: "critical"
    webhook_configs:
      - url: "http://api:3000/api/v1/webhooks/alerts"
        send_resolved: true
    # In production, add Slack/PagerDuty/email receivers:
    # slack_configs:
    #   - api_url: "https://hooks.slack.com/services/xxx"
    #     channel: "#alerts"
