global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "api"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["api:3000"]
        labels:
          service: "api"

  - job_name: "worker"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["worker:3001"]
        labels:
          service: "worker"
